AutoName: KyuubiMask

Summary: プライバシーを守る通知マスクツール

Description: |-
  KyuubiMaskは、画面共有・プレゼン・のぞき見などから大切な情報を守る、
  プライバシー重視の通知マスクアプリです。

  主な機能:
  * 完全オフライン動作（インターネット権限なし）
  * データの保存・ログ記録なし
  * 任意のアプリの通知を汎用テキストに置き換えてマスク
  * Slack・Discord・WhatsApp・LINE のプリセット内蔵
  * アプリごとのマスク有効/無効切り替え
  * クイック設定タイルでワンタップ切り替え
  * Apache 2.0 ライセンスのオープンソース
  * トラッキング・広告・アナリティクスなし

  プライバシーへの取り組み:
  * 一切のデータ収集なし
  * 通知内容を保存しない
  * 完全オフラインで動作
  * Google Play サービス・サードパーティ SDK 不使用

  インストール済みの任意のアプリに対応。設定の「カスタムアプリを追加…」から対象を選択できます。
  Slack・Discord・WhatsApp・LINE はプリセットとして利用可能です。
  設定画面またはクイック設定タイルからサービスの有効/無効を切り替えられます。

  こんなシーンに最適:
  * 画面共有中のプライバシー保護
  * プレゼン・デモ
  * 公共の場での使用
  * 画面録画

