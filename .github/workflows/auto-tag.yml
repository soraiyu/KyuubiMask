name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

concurrency:
  # Serialize release runs on the same base branch to prevent version/tag races
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  # Phase 1: triggered by any regular (non-release) PR merged to main/master.
  # Bumps the version, updates all release files, pushes to a release/vX.Y.Z
  # branch, and opens a pull request for review.
  # The developer reviews and merges that PR; Actions never commits directly
  # to the base branch.
  #
  # Prerequisites:
  #   • Settings → Actions → General → "Allow GitHub Actions to create and
  #     approve pull requests" must be enabled so that GITHUB_TOKEN can open
  #     the release PR via `gh pr create`.
  prepare-release:
    if: >-
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'release')
    name: Prepare Release PR
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push release branch
      pull-requests: write  # create release PR
      issues: write         # create/update 'release' label

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Check out the base branch (e.g. main) at the post-merge state,
        # not the synthetic refs/pull/*/merge commit.
        ref: ${{ github.event.pull_request.base.ref }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Extract version and auto-bump if needed
      id: get_version
      run: |
        # Extract versionName from app/build.gradle.kts
        # Expected format: versionName = "x.y.z"
        VERSION=$(grep -E '^\s*versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
        VERSION_CODE=$(grep -E '^\s*versionCode\s*=\s*' app/build.gradle.kts | sed -E 's/.*=\s*([0-9]+).*/\1/')

        if [ -z "$VERSION" ]; then
          echo "❌ Could not extract version from build.gradle.kts"
          echo "Expected format: versionName = \"x.y.z\""
          exit 1
        fi

        if [ -z "$VERSION_CODE" ]; then
          echo "❌ Could not extract versionCode from build.gradle.kts"
          echo "Expected format: versionCode = <number>"
          exit 1
        fi

        # Validate version format: strict x.y.z semver required for auto-bump logic
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "❌ Version '$VERSION' is not a valid semver string (expected x.y.z with integers only)"
          echo "Please update versionName in app/build.gradle.kts to follow the x.y.z format before merging."
          exit 1
        fi

        ORIGINAL_VERSION="$VERSION"
        ORIGINAL_VERSION_CODE="$VERSION_CODE"

        # Auto-bump patch version until we find an unused tag.
        # Re-run guard: if a release branch for this version already exists on the
        # remote, a prior run of this workflow already claimed this version — break
        # immediately instead of bumping, so we don't produce a spurious extra release.
        while git rev-parse "v$VERSION" >/dev/null 2>&1; do
          if git ls-remote --exit-code origin "refs/heads/release/v$VERSION" >/dev/null 2>&1; then
            echo "ℹ️  Tag v$VERSION exists but release/v$VERSION branch also exists — resuming prior run, no extra bump"
            break
          fi
          PREV_VERSION="$VERSION"
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION="${PARTS[0]}.${PARTS[1]}.$((${PARTS[2]} + 1))"
          VERSION_CODE=$((VERSION_CODE + 1))
          echo "⚠️  Tag v$PREV_VERSION already exists - auto-bumping to v$VERSION (code: $VERSION_CODE)"
        done

        # Update build.gradle.kts if version was bumped
        if [ "$VERSION" != "$ORIGINAL_VERSION" ]; then
          sed -i "s/versionCode = $ORIGINAL_VERSION_CODE/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$ORIGINAL_VERSION\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "✅ build.gradle.kts updated: versionName $ORIGINAL_VERSION → $VERSION, versionCode $ORIGINAL_VERSION_CODE → $VERSION_CODE"
        else
          echo "✅ Tag v$VERSION does not exist yet - no bump needed"
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Final version: $VERSION (code: $VERSION_CODE)"

    - name: Update CHANGELOG.md
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 - <<'PYEOF'
        import re, os
        from datetime import datetime, timezone

        version = os.environ['VERSION']
        today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
        repo = os.environ['GITHUB_REPOSITORY']

        with open('CHANGELOG.md', 'r') as f:
            content = f.read()

        # Extract content between [Unreleased] and first versioned section
        unreleased_match = re.search(
            r'^## \[Unreleased\]\n(.*?)(?=^## \[|\Z)',
            content, re.MULTILINE | re.DOTALL
        )
        unreleased_body = unreleased_match.group(1).strip() if unreleased_match else ''

        # Get previous version (first versioned heading)
        prev_match = re.search(r'^## \[(\d+\.\d+\.\d+)\]', content, re.MULTILINE)
        prev_version = prev_match.group(1) if prev_match else None

        # Build new versioned section
        new_versioned = f'## [{version}] - {today}'
        if unreleased_body:
            new_versioned += f'\n\n{unreleased_body}'

        # Replace [Unreleased] block with an empty [Unreleased] + the new versioned section
        content = re.sub(
            r'^## \[Unreleased\].*?(?=^## \[|\Z)',
            f'## [Unreleased]\n\n{new_versioned}\n\n',
            content,
            flags=re.MULTILINE | re.DOTALL
        )

        # Update [Unreleased] comparison link
        content = re.sub(
            r'\[Unreleased\]: .*',
            f'[Unreleased]: https://github.com/{repo}/compare/v{version}...HEAD',
            content
        )

        # Insert new version link after [Unreleased] link (only if not already present)
        if f'[{version}]:' not in content:
            if prev_version:
                new_link = f'[{version}]: https://github.com/{repo}/compare/v{prev_version}...v{version}'
            else:
                new_link = f'[{version}]: https://github.com/{repo}/releases/tag/v{version}'
            content = re.sub(
                r'(\[Unreleased\]: [^\n]+\n)',
                f'\\g<1>{new_link}\n',
                content
            )

        with open('CHANGELOG.md', 'w') as f:
            f.write(content)

        print(f'✅ CHANGELOG.md updated with version {version}')
        PYEOF

    - name: Update F-Droid metadata
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        VERSION_CODE: ${{ steps.get_version.outputs.version_code }}
      run: |
        python3 - <<'PYEOF'
        import re, os

        version = os.environ['VERSION']
        version_code = os.environ['VERSION_CODE']
        # Use the tag name as the commit ref so F-Droid always resolves to the
        # tagged commit, regardless of any auto-bump commit that precedes the tag.
        commit_ref = f'v{version}'

        with open('metadata/com.rtneg.kyuubimask.yml', 'r') as f:
            content = f.read()

        # Insert new build entry at top of Builds section (only if not already present)
        if f'versionName: {version}' not in content:
            new_build = (
                f'  - versionName: {version}\n'
                f'    versionCode: {version_code}\n'
                f'    commit: {commit_ref}\n'
                f'    subdir: app\n'
                f'    gradle:\n'
                f'      - yes'
            )
            content = re.sub(
                r'(^Builds:\n)',
                f'\\g<1>{new_build}\n',
                content, flags=re.MULTILINE
            )

        # Update CurrentVersion and CurrentVersionCode
        content = re.sub(r'^CurrentVersion: .*', f'CurrentVersion: {version}', content, flags=re.MULTILINE)
        content = re.sub(r'^CurrentVersionCode: .*', f'CurrentVersionCode: {version_code}', content, flags=re.MULTILINE)

        with open('metadata/com.rtneg.kyuubimask.yml', 'w') as f:
            f.write(content)

        print(f'✅ F-Droid metadata updated with version {version}')
        PYEOF

    - name: Create fastlane changelogs
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        VERSION_CODE: ${{ steps.get_version.outputs.version_code }}
      run: |
        python3 - <<'PYEOF'
        import re, os

        version = os.environ['VERSION']
        version_code = os.environ['VERSION_CODE']

        en_path = f'fastlane/metadata/android/en-US/changelogs/{version_code}.txt'
        ja_path = f'fastlane/metadata/android/ja-JP/changelogs/{version_code}.txt'

        os.makedirs(os.path.dirname(en_path), exist_ok=True)
        os.makedirs(os.path.dirname(ja_path), exist_ok=True)

        def extract_changelog_bullets(version):
            with open('CHANGELOG.md', 'r') as f:
                content = f.read()
            version_match = re.search(
                rf'^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)',
                content, re.MULTILINE | re.DOTALL
            )
            if not version_match:
                return f'Version {version}'
            section = version_match.group(1).strip()
            lines = []
            for line in section.split('\n'):
                line = line.strip()
                if line.startswith('- '):
                    lines.append('• ' + line[2:])
                elif line and not line.startswith('#'):
                    lines.append(line)
            return '\n'.join(lines) if lines else f'Version {version}'

        if not os.path.exists(en_path):
            changelog_text = extract_changelog_bullets(version)
            with open(en_path, 'w') as f:
                f.write(changelog_text + '\n')
            print(f'✅ Created {en_path}')
        else:
            print(f'ℹ️  {en_path} already exists, skipping')

        if not os.path.exists(ja_path):
            # Use English content as placeholder; replace manually for Japanese localisation
            if os.path.exists(en_path):
                with open(en_path) as f:
                    en_content = f.read()
            else:
                en_content = f'Version {version}\n'
            with open(ja_path, 'w') as f:
                f.write(en_content)
            print(f'✅ Created {ja_path} (using English content as placeholder)')
        else:
            print(f'ℹ️  {ja_path} already exists, skipping')
        PYEOF

    - name: Ensure 'release' label exists
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh label create release \
          --description "Automated release PR" \
          --color "0075ca" \
          --force
        echo "✅ 'release' label is ready"

    - name: Commit, push release branch, and open PR
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        BASE: ${{ github.event.pull_request.base.ref }}
        GH_TOKEN: ${{ github.token }}
      run: |
        BRANCH="release/v$VERSION"
        TAG="v$VERSION"

        git add app/build.gradle.kts CHANGELOG.md metadata/com.rtneg.kyuubimask.yml \
          fastlane/metadata/android/en-US/changelogs/ \
          fastlane/metadata/android/ja-JP/changelogs/

        if git diff --staged --quiet; then
          echo "ℹ️  No file changes needed — all version files are already up to date"
          # The developer already bumped the version in their PR. No release branch
          # or PR is required. Push the tag directly — this is not a commit to main,
          # so it satisfies the "no direct commits to main" constraint.
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "ℹ️  Tag $TAG already exists on remote — nothing to do"
            exit 0
          fi
          echo "🏷️  Creating tag: $TAG (no file changes needed)"
          git tag -a "$TAG" -m "Release $TAG - Auto-tagged on PR merge"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed successfully!"
          exit 0
        fi

        git commit -m "chore: update version files for $TAG"
        # --force handles re-runs where the branch already exists remotely
        git push origin "HEAD:refs/heads/$BRANCH" --force
        echo "✅ Pushed release branch: $BRANCH"

        # Write PR body to a temp file to avoid YAML multi-line string issues
        {
          printf 'Automated release PR for %s.\n\n' "$TAG"
          printf 'Changes included:\n'
          printf '%s\n' '- app/build.gradle.kts — version bump'
          printf '%s\n' "- CHANGELOG.md — [Unreleased] promoted to [$VERSION]"
          printf '%s\n' '- metadata/com.rtneg.kyuubimask.yml — F-Droid build entry + CurrentVersion'
          printf '%s\n' '- fastlane/metadata/android/*/changelogs/ — store changelogs'
          printf '\nNext step: Review and merge this PR to create the %s git tag and trigger the release build.\n' "$TAG"
        } > /tmp/pr-body.txt

        # Create PR; fall back to finding the existing PR on re-runs
        if ! PR_URL=$(gh pr create \
          --base "$BASE" \
          --head "$BRANCH" \
          --title "chore: release $TAG" \
          --body-file /tmp/pr-body.txt \
          --label "release"); then
          PR_URL=$(gh pr list --head "$BRANCH" --base "$BASE" --json url -q '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "❌ Failed to create PR and no existing PR found for $BRANCH → $BASE"
            echo ""
            echo "   'Allow GitHub Actions to create and approve pull requests' may be"
            echo "   disabled. Enable it under Settings → Actions → General."
            exit 1
          fi
          echo "ℹ️  Using existing PR: $PR_URL"
        else
          echo "✅ Release PR created: $PR_URL"
        fi
        echo "📋 Review and merge the PR to trigger tag creation: $PR_URL"

  # Phase 2: triggered when the auto-created release PR (label: 'release') is merged.
  # Creates and pushes the git tag. Tag pushes are not restricted by branch rulesets,
  # so GITHUB_TOKEN is sufficient — no PAT required.
  create-tag:
    # Guard: only run for PRs merged by github-actions[bot] from a release/v* branch.
    # This prevents accidental or malicious tagging from manually-labelled PRs.
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    name: Create Release Tag
    runs-on: ubuntu-latest

    permissions:
      contents: write  # push git tag

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Check out the base branch at the post-merge state, not refs/pull/*/merge.
        ref: ${{ github.event.pull_request.base.ref }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Extract version
      id: get_version
      run: |
        VERSION=$(grep -E '^\s*versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
        if [ -z "$VERSION" ]; then
          echo "❌ Could not extract version from build.gradle.kts"
          exit 1
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Version: $VERSION"

    - name: Create and push tag
      run: |
        TAG="v${{ steps.get_version.outputs.version }}"

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "⚠️  Tag $TAG already exists, skipping"
          exit 0
        fi

        echo "🏷️  Creating tag: $TAG"
        git tag -a "$TAG" -m "Release $TAG - Auto-tagged on PR merge"

        echo "📤 Pushing tag: $TAG"
        git push origin "$TAG"

        echo "✅ Tag $TAG created and pushed successfully!"
