name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to release from (leave empty to use the repository default branch)'
        required: false
        default: ''

concurrency:
  # Serialize release runs on the same base branch to prevent version/tag races
  group: release-${{ github.event.pull_request.base.ref || inputs.base_branch || github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  # Phase 1: Triggered by any regular (non-release/fdroid) PR merged to main,
  # or manually via workflow_dispatch.
  # Creates a release/vX.Y.Z branch with version bumps + changelog updates,
  # then opens a PR with the 'release' label.
  # GitHub Actions never pushes directly to main — no branch protection bypass needed.
  #
  # Prerequisites:
  #   • Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
  prepare-release:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'release') &&
      !contains(github.event.pull_request.labels.*.name, 'fdroid') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-release'))
    name: Prepare Release PR
    runs-on: ubuntu-latest

    env:
      BASE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && (inputs.base_branch || github.event.repository.default_branch) || github.event.pull_request.base.ref || github.event.repository.default_branch }}

    permissions:
      contents: write       # push release/v* branch
      pull-requests: write  # open release PR
      issues: write         # create/update 'release' label

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        # Check out the base branch (e.g. main) at the post-merge state,
        # not the synthetic refs/pull/*/merge commit.
        ref: ${{ env.BASE_BRANCH }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Extract version and auto-bump if needed
      id: get_version
      run: |
        # Use the latest semver git tag as the authoritative "current version".
        # This keeps the release version in sync with what was actually published,
        # regardless of what versionName is currently in build.gradle.kts.
        LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

        # Read values from build.gradle.kts
        GRADLE_VERSION=$(grep -E '^\s*versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
        GRADLE_VERSION_CODE=$(grep -E '^\s*versionCode\s*=\s*' app/build.gradle.kts | sed -E 's/.*=\s*([0-9]+).*/\1/')

        if [ -z "$GRADLE_VERSION_CODE" ]; then
          echo "❌ Could not extract versionCode from build.gradle.kts"
          exit 1
        fi

        if [ -n "$LATEST_TAG" ]; then
          BASE_VERSION="${LATEST_TAG#v}"
          # Read the versionCode that was recorded at the tagged commit.
          # This guarantees the new code is exactly TAGGED_CODE + N regardless of
          # any manual edits to build.gradle.kts after the last release.
          TAGGED_CODE=$(git show "${LATEST_TAG}:app/build.gradle.kts" 2>/dev/null \
            | grep -E '^\s*versionCode\s*=\s*' | sed -E 's/.*=\s*([0-9]+).*/\1/')
          if [ -z "$TAGGED_CODE" ]; then
            echo "⚠️  Could not read versionCode from ${LATEST_TAG}:app/build.gradle.kts"
            echo "   Falling back to current build.gradle.kts versionCode ($GRADLE_VERSION_CODE)."
            echo "   If build.gradle.kts has been manually edited since the last release"
            echo "   the generated versionCode may not match expectations — please verify."
            TAGGED_CODE="$GRADLE_VERSION_CODE"
          fi
          echo "📍 Latest git tag: $LATEST_TAG (code: $TAGGED_CODE) — using as base for version bump"

          # Compute first candidate: latest_tag_patch + 1
          IFS='.' read -ra PARTS <<< "$BASE_VERSION"
          VERSION="${PARTS[0]}.${PARTS[1]}.$((${PARTS[2]} + 1))"
          VERSION_CODE=$((TAGGED_CODE + 1))
        elif [ -n "$GRADLE_VERSION" ] && echo "$GRADLE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          # No tags yet: use the version in build.gradle.kts as the first release candidate.
          # The bump loop below will skip further if that version happens to be taken.
          VERSION="$GRADLE_VERSION"
          VERSION_CODE="$GRADLE_VERSION_CODE"
          echo "📍 No git tags found — using build.gradle.kts version $GRADLE_VERSION as first release candidate"
        else
          echo "❌ No git tags found and build.gradle.kts has no valid x.y.z versionName"
          exit 1
        fi

        # Ensure versionCode satisfies Android's minimum requirement of 1
        if [ "$VERSION_CODE" -lt 1 ]; then
          VERSION_CODE=1
        fi

        # Keep bumping until we find a version with neither an existing tag nor an
        # in-flight release branch.
        while git rev-parse "v$VERSION" >/dev/null 2>&1 || \
              git ls-remote --exit-code origin "refs/heads/release/v$VERSION" >/dev/null 2>&1; do
          PREV_VERSION="$VERSION"
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION="${PARTS[0]}.${PARTS[1]}.$((${PARTS[2]} + 1))"
          VERSION_CODE=$((VERSION_CODE + 1))
          echo "⚠️  Tag or release branch for v$PREV_VERSION already exists — auto-bumping to v$VERSION (code: $VERSION_CODE)"
        done

        # Always update build.gradle.kts so the release branch has the correct values
        ORIGINAL_GRADLE_VERSION=$(grep -E '^\s*versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
        ORIGINAL_GRADLE_CODE=$(grep -E '^\s*versionCode\s*=\s*' app/build.gradle.kts | sed -E 's/.*=\s*([0-9]+).*/\1/')
        sed -i "s/versionCode = $ORIGINAL_GRADLE_CODE/versionCode = $VERSION_CODE/" app/build.gradle.kts
        sed -i "s/versionName = \"$ORIGINAL_GRADLE_VERSION\"/versionName = \"$VERSION\"/" app/build.gradle.kts
        echo "✅ build.gradle.kts: versionName $ORIGINAL_GRADLE_VERSION → $VERSION, versionCode $ORIGINAL_GRADLE_CODE → $VERSION_CODE"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Next release: $VERSION (code: $VERSION_CODE)"

    - name: Populate [Unreleased] from commits since last release
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_LABELS: ${{ github.event_name == 'pull_request' && join(github.event.pull_request.labels.*.name, ',') || '' }}
      run: |
        python3 - <<'PYEOF'
        import re, os, subprocess

        MAX_COMMITS = 20

        event_name = os.environ.get('EVENT_NAME', '')
        pr_title   = os.environ.get('PR_TITLE', '').strip()
        pr_number  = os.environ.get('PR_NUMBER', '').strip()
        pr_labels  = [l.strip().lower() for l in os.environ.get('PR_LABELS', '').split(',') if l.strip()]

        with open('CHANGELOG.md', 'r') as f:
            content = f.read()

        # Check whether [Unreleased] already has *real* content (at least one list item).
        # If it does, a developer has curated entries manually — skip auto-fill.
        unreleased_match = re.search(
            r'^## \[Unreleased\]\n(.*?)(?=^## \[|\Z)',
            content, re.MULTILINE | re.DOTALL
        )
        unreleased_body = unreleased_match.group(1).strip() if unreleased_match else ''
        if unreleased_body and re.search(r'^[ \t]*[-*] ', unreleased_body, re.MULTILINE):
            print('ℹ️  [Unreleased] already has content — skipping auto-fill')
            exit(0)

        def categorize_line(line):
            """Assign a changelog category from a commit subject line."""
            msg = re.sub(r'^[-*]\s*', '', line)
            lower = msg.lower()
            if re.match(r'(feat|feature|add)[\s:(]', lower) or lower.startswith(('add ', 'adds ', 'added ', 'new ')):
                return 'Added'
            if re.match(r'(fix|bug|hotfix)[\s:(]', lower) or lower.startswith(('fix ', 'fixes ', 'fixed ', 'bug ')):
                return 'Fixed'
            return 'Changed'

        def release_branch_version(ref_name):
            """Return a sortable version tuple for release/vX.Y.Z branch names."""
            match = re.search(r'release/v(\d+)\.(\d+)\.(\d+)$', ref_name)
            if not match:
                return None
            return tuple(int(part) for part in match.groups())

        # If a release branch is already in flight, only collect commits added after
        # that branch was cut so queued release PRs do not duplicate changelog entries.
        log_range = None

        remote_release_result = subprocess.run(
            ['git', 'ls-remote', '--heads', 'origin', 'release/v*'],
            capture_output=True, text=True
        )
        if remote_release_result.returncode == 0 and remote_release_result.stdout.strip():
            release_branches = []
            for line in remote_release_result.stdout.strip().splitlines():
                parts = line.split()
                if len(parts) != 2:
                    continue
                remote_ref = parts[1]
                version = release_branch_version(remote_ref)
                if version is None:
                    continue
                release_branches.append((version, remote_ref.replace('refs/heads/', '')))

            if release_branches:
                _, newest_release_branch = max(release_branches, key=lambda item: item[0])
                local_release_ref = f'refs/remotes/origin/{newest_release_branch}'

                fetch_result = subprocess.run(
                    ['git', 'fetch', '--no-tags', 'origin',
                     f'{newest_release_branch}:{local_release_ref}'],
                    capture_output=True, text=True
                )
                if fetch_result.returncode == 0:
                    merge_base_result = subprocess.run(
                        ['git', 'merge-base', 'HEAD', local_release_ref],
                        capture_output=True, text=True
                    )
                    if merge_base_result.returncode == 0 and merge_base_result.stdout.strip():
                        branch_point = merge_base_result.stdout.strip()
                        log_range = f'{branch_point}..HEAD'
                        print(f'📍 Collecting commits since branch point of {newest_release_branch}')

        if not log_range:
            # No in-flight release branch found; collect all commits since the last release tag.
            tag_result = subprocess.run(
                ['git', 'describe', '--tags', '--abbrev=0'],
                capture_output=True, text=True
            )
            if tag_result.returncode == 0:
                since_tag = tag_result.stdout.strip()
                log_range = f'{since_tag}..HEAD'
                print(f'📍 Collecting commits since {since_tag}')
            else:
                log_range = f'-{MAX_COMMITS}'
                print(f'📍 No tags found; collecting last {MAX_COMMITS} commits')

        log_result = subprocess.run(
            ['git', 'log', log_range, '--pretty=format:- %s', '--no-merges'],
            capture_output=True, text=True
        )

        new_sections = {}  # category -> [lines]

        if log_result.returncode == 0 and log_result.stdout.strip():
            commits = [l for l in log_result.stdout.strip().splitlines() if l.strip()][:MAX_COMMITS]
            for commit in commits:
                # Skip release-automation commits (chore: release vX.Y.Z)
                if re.match(r'^- chore: release v', commit, re.IGNORECASE):
                    continue
                cat = categorize_line(commit)
                new_sections.setdefault(cat, []).append(commit)

        # Fallback: use PR title if git log produced nothing
        if not new_sections and event_name == 'pull_request' and pr_title:
            if any(l in ('bug', 'fix', 'bugfix', 'type: bug') for l in pr_labels):
                category = 'Fixed'
            elif any(l in ('enhancement', 'feature', 'new feature', 'type: enhancement') for l in pr_labels):
                category = 'Added'
            else:
                category = 'Changed'
            pr_ref = f' (#{pr_number})' if pr_number else ''
            new_sections[category] = [f'- {pr_title}{pr_ref}']

        if not new_sections:
            print('ℹ️  No entries to add to [Unreleased]')
            exit(0)

        new_lines = []
        for cat in ('Added', 'Fixed', 'Changed'):
            if cat in new_sections:
                new_lines.append(f'### {cat}')
                new_lines.extend(new_sections[cat])

        new_content = '\n'.join(new_lines)
        content = re.sub(
            r'^(## \[Unreleased\])\n',
            f'## [Unreleased]\n\n{new_content}\n\n',
            content,
            flags=re.MULTILINE
        )

        with open('CHANGELOG.md', 'w') as f:
            f.write(content)

        print(f'✅ Populated [Unreleased] with:\n{new_content}')
        PYEOF

    - name: Update CHANGELOG.md
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 - <<'PYEOF'
        import re, os
        from datetime import datetime, timezone

        version = os.environ['VERSION']
        today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
        repo = os.environ['GITHUB_REPOSITORY']

        with open('CHANGELOG.md', 'r') as f:
            content = f.read()

        # Extract content between [Unreleased] and first versioned section
        unreleased_match = re.search(
            r'^## \[Unreleased\]\n(.*?)(?=^## \[|\Z)',
            content, re.MULTILINE | re.DOTALL
        )
        unreleased_body = unreleased_match.group(1).strip() if unreleased_match else ''

        # Get previous version (first versioned heading)
        prev_match = re.search(r'^## \[(\d+\.\d+\.\d+)\]', content, re.MULTILINE)
        prev_version = prev_match.group(1) if prev_match else None

        # Build new versioned section
        new_versioned = f'## [{version}] - {today}'
        if unreleased_body:
            new_versioned += f'\n\n{unreleased_body}'

        # Replace [Unreleased] block with an empty [Unreleased] + the new versioned section
        content = re.sub(
            r'^## \[Unreleased\].*?(?=^## \[|\Z)',
            f'## [Unreleased]\n\n{new_versioned}\n\n',
            content,
            flags=re.MULTILINE | re.DOTALL
        )

        # Update [Unreleased] comparison link
        content = re.sub(
            r'\[Unreleased\]: .*',
            f'[Unreleased]: https://github.com/{repo}/compare/v{version}...HEAD',
            content
        )

        # Insert new version link after [Unreleased] link (only if not already present)
        if f'[{version}]:' not in content:
            if prev_version:
                new_link = f'[{version}]: https://github.com/{repo}/compare/v{prev_version}...v{version}'
            else:
                new_link = f'[{version}]: https://github.com/{repo}/releases/tag/v{version}'
            content = re.sub(
                r'(\[Unreleased\]: [^\n]+\n)',
                f'\\g<1>{new_link}\n',
                content
            )

        with open('CHANGELOG.md', 'w') as f:
            f.write(content)

        print(f'✅ CHANGELOG.md updated with version {version}')
        PYEOF

    - name: Create fastlane changelogs
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        VERSION_CODE: ${{ steps.get_version.outputs.version_code }}
      run: |
        python3 - <<'PYEOF'
        import re, os

        version = os.environ['VERSION']
        version_code = os.environ['VERSION_CODE']

        en_path = f'fastlane/metadata/android/en-US/changelogs/{version_code}.txt'
        ja_path = f'fastlane/metadata/android/ja-JP/changelogs/{version_code}.txt'

        os.makedirs(os.path.dirname(en_path), exist_ok=True)
        os.makedirs(os.path.dirname(ja_path), exist_ok=True)

        def extract_changelog_bullets(version):
            with open('CHANGELOG.md', 'r') as f:
                content = f.read()
            version_match = re.search(
                rf'^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)',
                content, re.MULTILINE | re.DOTALL
            )
            if not version_match:
                return f'Version {version}'
            section = version_match.group(1).strip()
            lines = []
            for line in section.split('\n'):
                line = line.strip()
                if line.startswith('- '):
                    lines.append('• ' + line[2:])
                elif line and not line.startswith('#'):
                    lines.append(line)
            return '\n'.join(lines) if lines else f'Version {version}'

        if not os.path.exists(en_path):
            changelog_text = extract_changelog_bullets(version)
            with open(en_path, 'w') as f:
                f.write(changelog_text + '\n')
            print(f'✅ Created {en_path}')
        else:
            print(f'ℹ️  {en_path} already exists, skipping')

        if not os.path.exists(ja_path):
            # Use English content as placeholder; replace manually for Japanese localisation
            if os.path.exists(en_path):
                with open(en_path) as f:
                    en_content = f.read()
            else:
                en_content = f'Version {version}\n'
            with open(ja_path, 'w') as f:
                f.write(en_content)
            print(f'✅ Created {ja_path} (using English content as placeholder)')
        else:
            print(f'ℹ️  {ja_path} already exists, skipping')
        PYEOF

    - name: Push release branch and open PR
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
        BASE: ${{ env.BASE_BRANCH }}
        GH_TOKEN: ${{ github.token }}
      run: |
        BRANCH="release/v$VERSION"
        TAG="v$VERSION"

        git checkout -b "$BRANCH"
        git add app/build.gradle.kts CHANGELOG.md \
          fastlane/metadata/android/en-US/changelogs/ \
          fastlane/metadata/android/ja-JP/changelogs/

        if git diff --staged --quiet; then
          echo "ℹ️  No file changes — committing empty release marker"
          git commit --allow-empty -m "chore: release $TAG"
        else
          git commit -m "chore: release $TAG"
        fi

        # --force handles re-runs where the branch already exists remotely
        git push origin "$BRANCH" --force
        echo "✅ Release branch $BRANCH pushed"

        # Ensure 'release' label exists (--force is idempotent)
        gh label create release \
          --description "Automated release PR" \
          --color "0075ca" \
          --force
        echo "✅ 'release' label is ready"

        # Create PR; fall back to finding the existing PR on re-runs
        if ! PR_URL=$(gh pr create \
          --title "chore: release $TAG" \
          --body "Automated release PR for \`$TAG\`. Merge this PR to create the git tag and trigger the release build." \
          --base "$BASE" \
          --head "$BRANCH" \
          --label "release"); then
          PR_URL=$(gh pr list --head "$BRANCH" --base "$BASE" --json url -q '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "❌ Failed to create PR and no existing PR found for $BRANCH → $BASE"
            echo ""
            echo "   'Allow GitHub Actions to create and approve pull requests' may be"
            echo "   disabled. Enable it under Settings → Actions → General."
            exit 1
          fi
          echo "ℹ️  Using existing PR: $PR_URL"
        else
          echo "✅ Release PR created: $PR_URL"
        fi
        echo "📋 Review and merge the PR to trigger tag creation: $PR_URL"

  # Phase 2: Triggered when the release PR (with 'release' label, head = release/v*)
  # is merged. Pushes the vX.Y.Z git tag. Tags are not restricted by branch
  # protection rules, so no bypass is needed here either.
  create-tag:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    name: Create and Push Tag
    runs-on: ubuntu-latest

    permissions:
      contents: write  # push git tag

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.base.ref }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create and push tag
      run: |
        VERSION=$(grep -E '^\s*versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"(.+)".*/\1/')
        TAG="v$VERSION"

        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "⚠️  Tag $TAG already exists — skipping"
          exit 0
        fi

        echo "🏷️  Creating tag: $TAG"
        git tag -a "$TAG" -m "Release $TAG - Auto-tagged on PR merge"

        echo "📤 Pushing tag: $TAG"
        git push origin "$TAG"

        echo "✅ Tag $TAG created and pushed successfully!"
