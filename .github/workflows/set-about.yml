name: Set Repository About

# This workflow sets the repository description, homepage URL, and topics.
# It requires a Personal Access Token (PAT) with the "repo" scope stored as
# the repository secret REPO_ABOUT_PAT.
# To create a PAT: GitHub → Settings → Developer settings → Personal access tokens

on:
  workflow_dispatch:

jobs:
  set-about:
    name: Update Repository Description, Website, and Topics
    runs-on: ubuntu-latest

    permissions: {}

    steps:
      - name: Update repository description and homepage
        env:
          GH_TOKEN: ${{ secrets.REPO_ABOUT_PAT }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/resp_meta.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }} \
            -d '{
              "description": "Privacy-first Android app that masks notification content to prevent shoulder surfing. No internet, no data collection. / 通知内容を隠すプライバシー優先のAndroidアプリ",
              "homepage": "https://github.com/${{ github.repository }}"
            }')
          if echo "$HTTP_STATUS" | grep -q "^2"; then
            echo "✅ Description and homepage updated (HTTP $HTTP_STATUS)."
          else
            echo "❌ Failed to update description/homepage (HTTP $HTTP_STATUS)."
            cat /tmp/resp_meta.json
            exit 1
          fi

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ secrets.REPO_ABOUT_PAT }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/resp_topics.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/topics \
            -d '{
              "names": [
                "android",
                "kotlin",
                "privacy",
                "notification",
                "shoulder-surfing",
                "fdroid",
                "open-source",
                "notification-masking",
                "android-app"
              ]
            }')
          if echo "$HTTP_STATUS" | grep -q "^2"; then
            echo "✅ Topics updated (HTTP $HTTP_STATUS)."
          else
            echo "❌ Failed to update topics (HTTP $HTTP_STATUS)."
            cat /tmp/resp_topics.json
            exit 1
          fi
